name: Build IPA (Unsigned)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Select Xcode version
      run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
    
    - name: Build Archive
      run: |
        xcodebuild archive \
          -project IPAAPIServer.xcodeproj \
          -scheme IPAAPIServer \
          -archivePath build/IPAAPIServer.xcarchive \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGN_ENTITLEMENTS="" \
          GCC_PREPROCESSOR_DEFINITIONS='$inherited' \
          2>&1 | tee build.log
    
    - name: Export IPA (Unsigned)
      run: |
        mkdir -p build/ExportOptions
        
        # Create export options for unsigned IPA
        cat > build/ExportOptions/ExportOptions.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string></string>
            <key>compileBitcode</key>
            <false/>
        </dict>
        </plist>
        EOF
        
        # Manual IPA creation since xcodebuild -exportArchive requires signing
        mkdir -p build/IPA/Payload
        cp -R build/IPAAPIServer.xcarchive/Products/Applications/IPAAPIServer.app build/IPA/Payload/
        cd build/IPA
        zip -r IPAAPIServer.ipa Payload
    
    - name: Verify IPA
      run: |
        ls -lh build/IPA/
        file build/IPA/IPAAPIServer.ipa
    
    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v4
      with:
        name: IPAAPIServer-unsigned
        path: build/IPA/IPAAPIServer.ipa
        retention-days: 30
