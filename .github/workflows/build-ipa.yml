name: Build IPA (Unsigned)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Select Xcode version
      run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
    
    - name: Create Xcode project
      run: |
        mkdir -p IPAAPIServer
        cd IPAAPIServer
        
        # Create project structure
        mkdir -p IPAAPIServer/{Supporting\ Files,Resources}
        
        # Copy Swift files
        cp ../AppDelegate.swift IPAAPIServer/
        
        # Create xcodeproj
        xcodebuild -version
    
    - name: Build Archive
      run: |
        xcodebuild archive \
          -scheme IPAAPIServer \
          -archivePath build/IPAAPIServer.xcarchive \
          -configuration Release \
          -derivedDataPath build/DerivedData \
          -allowProvisioningUpdates \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_ENTITLEMENTS="" \
          2>&1 | tee build.log
    
    - name: Export IPA (Unsigned)
      run: |
        mkdir -p build/ExportOptions
        
        # Create export options for unsigned IPA
        cat > build/ExportOptions/ExportOptions.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string></string>
        </dict>
        </plist>
        EOF
        
        xcodebuild -exportArchive \
          -archivePath build/IPAAPIServer.xcarchive \
          -exportOptionsPlist build/ExportOptions/ExportOptions.plist \
          -exportPath build/IPA \
          2>&1 | tee export.log
    
    - name: Verify IPA
      run: |
        ls -lh build/IPA/
        file build/IPA/IPAAPIServer.ipa
        unzip -l build/IPA/IPAAPIServer.ipa | head -20
    
    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v3
      with:
        name: IPAAPIServer-unsigned
        path: build/IPA/IPAAPIServer.ipa
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: build/IPA/IPAAPIServer.ipa
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
